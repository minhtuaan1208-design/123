name: Il2Cpp Dump
on: workflow_dispatch

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install dotnet
        run: |
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 8.0 --runtime dotnet
          echo "$HOME/.dotnet" >> $GITHUB_PATH

      - name: Download APK from MediaFire
        run: |
          DOWNLOAD_URL=$(curl -s "https://www.mediafire.com/file/f7hdxz25ofz5ass/HSNRv011.apk/file" | grep -o 'https://download[^"]*\.apk[^"]*' | head -1)
          wget -O HSNRv011.apk "$DOWNLOAD_URL"
          ls -lh HSNRv011.apk

      - name: Download Il2CppDumper (latest)
        run: |
          LATEST=$(curl -s https://api.github.com/repos/Perfare/Il2CppDumper/releases/latest | grep browser_download_url | grep linux | cut -d'"' -f4)
          echo "Downloading: $LATEST"
          wget -O il2cpp.zip "$LATEST"
          unzip il2cpp.zip -d dumper
          ls dumper/

      - name: Extract files from APK
        run: |
          unzip HSNRv011.apk \
            "lib/arm64-v8a/libil2cpp.so" \
            "assets/bin/Data/Managed/Metadata/global-metadata.dat" \
            -d extracted/

      - name: Run Il2CppDumper
        run: |
          mkdir -p output
          ~/.dotnet/dotnet dumper/Il2CppDumper.dll \
            extracted/lib/arm64-v8a/libil2cpp.so \
            extracted/assets/bin/Data/Managed/Metadata/global-metadata.dat \
            output/

      - name: Upload dump.cs
        uses: actions/upload-artifact@v4
        with:
          name: il2cpp-dump
          path: output/dump.cs
