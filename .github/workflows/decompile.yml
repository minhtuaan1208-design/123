name: Il2Cpp Dump
on: workflow_dispatch

jobs:
  dump:
    runs-on: windows-latest
    steps:
      - name: Download APK from MediaFire
        run: |
          $page = Invoke-WebRequest -Uri "https://www.mediafire.com/file/f7hdxz25ofz5ass/HSNRv011.apk/file" -UseBasicParsing
          $url = ($page.Links | Where-Object { $_.href -match "download.*\.apk" } | Select-Object -First 1).href
          Write-Host "URL: $url"
          Invoke-WebRequest -Uri $url -OutFile HSNRv011.apk
          Get-Item HSNRv011.apk

      - name: Download Il2CppDumper
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/Perfare/Il2CppDumper/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "win" -or $_.name -match "net6" } | Select-Object -First 1
          Write-Host "Downloading: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile il2cpp.zip
          Expand-Archive il2cpp.zip -DestinationPath dumper
          dir dumper

      - name: Extract files from APK
        run: |
          Expand-Archive HSNRv011.apk -DestinationPath extracted
          dir extracted

      - name: Run Il2CppDumper
        run: |
          mkdir output
          $so = "extracted\lib\arm64-v8a\libil2cpp.so"
          $meta = "extracted\assets\bin\Data\Managed\Metadata\global-metadata.dat"
          dotnet dumper\Il2CppDumper.dll $so $meta output\

      - name: Upload dump.cs
        uses: actions/upload-artifact@v4
        with:
          name: il2cpp-dump
          path: output/dump.cs
