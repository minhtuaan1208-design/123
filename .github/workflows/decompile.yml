name: Il2Cpp Dump
on: workflow_dispatch

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get install -y dotnet-runtime-8.0 wget unzip

      - name: Download APK from MediaFire
        run: |
          wget -O HSNRv011.apk "https://www.mediafire.com/file/f7hdxz25ofz5ass/HSNRv011.apk/file?dkey=cixl6oa63oh&r=1075"

      - name: Download Il2CppDumper
        run: |
          wget https://github.com/Perfare/Il2CppDumper/releases/latest/download/Il2CppDumper-net6-linux.zip
          unzip Il2CppDumper-net6-linux.zip -d dumper

      - name: Extract metadata from APK
        run: |
          unzip HSNRv011.apk \
            "lib/arm64-v8a/libil2cpp.so" \
            "assets/bin/Data/Managed/Metadata/global-metadata.dat" \
            -d extracted/

      - name: Run Il2CppDumper
        run: |
          mkdir output
          dotnet dumper/Il2CppDumper.dll \
            extracted/lib/arm64-v8a/libil2cpp.so \
            extracted/assets/bin/Data/Managed/Metadata/global-metadata.dat \
            output/

      - name: Upload dump.cs
        uses: actions/upload-artifact@v4
        with:
          name: il2cpp-dump
          path: output/dump.cs
